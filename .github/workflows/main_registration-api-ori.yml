name: Deploy Python app to Azure Web App - registration-api

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r api-python/requirements.txt

      - name: List files
        run: |
          pwd
          ls -la
          ls -la api-python

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: registration-api
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: ./api-python
